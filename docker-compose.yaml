services:
  d2foundry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: d2foundry
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # REQUIRED: Get a Bungie API key at https://www.bungie.net/en/Application
      - BUNGIE_API_KEY=${BUNGIE_API_KEY}
    # No volumes needed for stateless app, but if you want to persist build cache:
    # volumes:
    #   - ./data:/app/.next/cache # Optional: persist build cache
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      
      - "traefik.http.routers.d2foundry.rule=Host(`d2foundry.timnnhomelab.me`)"
      - "traefik.http.routers.d2foundry.entrypoints=websecure"
      - "traefik.http.routers.d2foundry.tls.certresolver=cloudflare"
      - "traefik.http.services.d2foundry.loadbalancer.server.port=3000"

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
